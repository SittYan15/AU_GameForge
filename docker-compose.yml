services:
  # 1. The Babylon.js Game Client
  frontend:
    build: ./frontend
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_SERVER_URL=http://localhost:3001
    depends_on:
      - backend

  # 2. The Multiplayer Node.js Server
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    # Run server with nodemon or node --watch for live reloading
    command: npm run dev
    environment:
      - CLIENT_ORIGIN=http://localhost:3000
      - DATABASE_HOST=host.docker.internal
